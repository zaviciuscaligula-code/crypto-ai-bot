name: Daily Crypto Ensemble Dashboard

on:
  schedule:
    # 05:00 UTC ισούται με 08:00 ώρα Ελλάδος (το καλοκαίρι)
    - cron: '0 5 * * *'
  # Σου επιτρέπει να το τρέξεις και χειροκίνητα αν θες
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy tensorflow statsmodels xgboost lightgbm scipy requests scikit-learn
    - name: Run Dashboard Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python send_telegram_dashboard.py
